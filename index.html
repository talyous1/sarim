<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tala's World — Sarim</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#4a4a45;
    --green:#9cc9a8;
    --pink:#e6b8c2;
    --pink-soft:#f3d6dd;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Patrick Hand', sans-serif;
    background:#000;
    color:var(--ink);
    overflow:hidden;
    height:100vh;
    width:100vw;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:url(assets/cursor.png) 25 25, auto;
  }
  body:active, body *:active{
    cursor:url(assets/cursor-click.png) 25 25, pointer !important;
  }
  .title-font{font-family:'Caveat', cursive;}

  #canvas{
    position:relative;
    width:1280px;
    height:631px;
    background:url(assets/background.jpg) center/cover;
    overflow:hidden;
    flex-shrink:0;
    flex-grow:0;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #stage{
    position:relative;
    height:100%;
    max-width:100%;
    aspect-ratio:16/9;
    overflow:hidden;
  }
  .page{
    position:absolute;
    inset:0;
    opacity:0;
    pointer-events:none;
    transition:opacity .5s ease;
  }
  .page.active{
    opacity:1;
    pointer-events:auto;
  }
  .page img.bleed{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events:none;
  }

  #loading img{
    position:absolute;
    left:16.17%;
    top:36.25%;
    width:68.26%;
  }

  #welcome img.overlay{
    position:absolute;
    left:5.27%;
    top:8.34%;
    width:89.1%;
  }
  #earth-wrap{
    position:absolute;
    left:35.99%;
    top:44.26%;
    width:28.46%;
    height:51.16%;
    cursor:url(assets/cursor.png) 25 25, pointer;
    transition:transform .25s ease;
  }
  #earth-wrap:hover{transform:scale(1.04);}
  #earth-img{
    width:100%;
    height:100%;
    object-fit:contain;
    animation:earth-spin 18s linear infinite;
  }
  @keyframes earth-spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
  }
  #family-img{opacity:0; transform:scale(.96); transition:opacity .8s ease, transform .8s ease;}
  #family.active #family-img{opacity:1; transform:scale(1);}
  #heart-img{
    position:absolute;
    left:50%;
    top:34.85%;
    width:4.2%;
    transform:translate(-50%,-50%);
    cursor:url(assets/cursor.png) 25 25, pointer;
    animation:beat 1.1s ease-in-out infinite;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.15));
  }
  @keyframes beat{
    0%,100%{transform:translate(-50%,-50%) scale(1);}
    25%{transform:translate(-50%,-50%) scale(1.3);}
    40%{transform:translate(-50%,-50%) scale(1);}
  }

  .hotspot{
    position:absolute;
    cursor:url(assets/cursor.png) 25 25, pointer;
  }
  #hs-timeline{ left:66.48%; top:14.35%; width:28.54%; height:30.27%; }
  #hs-poster  { left:5.89%;  top:55.21%; width:28.56%; height:30.28%; }
  #hs-video   { left:66.48%; top:55.21%; width:28.54%; height:30.28%; }

  .sub-page-content{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px;
  }
  .sub-page-content h1{font-size:2.6rem; margin-bottom:10px;}
  .placeholder-box{
    width:min(60vw,460px);
    height:min(38vh,280px);
    border:2px dashed #c8c2b8;
    border-radius:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.1rem;
    opacity:.65;
    background:rgba(255,255,255,.35);
  }

  .timeline-title{font-size:2.4rem; margin-top:10%; margin-bottom:0;}
  .timeline-track{
    position:absolute;
    left:6%;
    right:6%;
    top:62%;
    transform:translateY(-50%);
    overflow-x:auto;
    overflow-y:hidden;
    padding:46px 10px 40px;
  }
  .timeline-line{
    position:relative;
    height:3px;
    background:var(--ink);
    border-radius:2px;
    min-width:600px;
  }
  .timeline-line::before, .timeline-line::after{
    content:"";
    position:absolute;
    top:50%;
    width:0;height:0;
    border-style:solid;
    transform:translateY(-50%);
  }
  .timeline-line::before{
    left:-10px;
    border-width:6px 10px 6px 0;
    border-color:transparent var(--ink) transparent transparent;
  }
  .timeline-line::after{
    right:-10px;
    border-width:6px 0 6px 10px;
    border-color:transparent transparent transparent var(--ink);
  }
  .t-item{
    position:absolute;
    top:50%;
    transform:translate(-50%,-50%);
    width:18px;height:18px;
    border-radius:50%;
    background:var(--pink);
    border:2px solid var(--ink);
    cursor:url(assets/cursor.png) 25 25, pointer;
    transition:transform .15s ease;
  }
  .t-item:hover{transform:translate(-50%,-50%) scale(1.3);}
  .t-item .t-date{
    position:absolute;
    top:-34px;
    left:50%;
    transform:translateX(-50%);
    font-size:1.05rem;
    font-weight:600;
    white-space:nowrap;
    color:var(--ink);
    font-family:'Caveat',cursive;
  }
  .t-item .t-label{
    position:absolute;
    top:26px;
    left:50%;
    transform:translateX(-50%);
    font-size:1rem;
    white-space:nowrap;
    max-width:160px;
  }
  #scroll-hint{
    position:absolute;
    left:50%;
    bottom:8%;
    transform:translateX(-50%);
    font-size:.85rem;
    color:var(--ink);
    opacity:.55;
    font-family:'Caveat',cursive;
  }

  #t-modal-backdrop{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.25);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
  }
  #t-modal-backdrop.show{display:flex;}
  #t-modal{
    background:#f1f0ec;
    border:2px solid var(--ink);
    border-radius:18px;
    padding:30px 34px;
    max-width:380px;
    text-align:center;
    position:relative;
  }
  #t-modal h3{margin:0 0 6px; font-family:'Caveat',cursive; font-size:1.8rem;}
  #t-modal .t-modal-date{color:#8a6fc2; margin-bottom:10px; display:block;}
  #t-modal-img{
    width:100%;
    max-height:220px;
    object-fit:cover;
    border-radius:12px;
    margin-bottom:12px;
  }
  #t-modal-link{
    margin-top:10px;
    color:#8a6fc2;
    text-decoration:underline;
    font-family:'Patrick Hand',sans-serif;
    cursor:url(assets/cursor.png) 25 25, pointer;
  }
  #t-close{
    position:absolute; top:8px; right:12px;
    cursor:pointer; font-size:1.2rem; background:none; border:none; color:var(--ink);
  }

  .back-btn{
    position:absolute;
    top:4%;
    left:3%;
    background:rgba(255,255,255,.55);
    border:1px solid var(--ink);
    border-radius:20px;
    padding:6px 16px;
    font-family:'Patrick Hand',sans-serif;
    cursor:url(assets/cursor.png) 25 25, pointer;
    z-index:10;
  }
</style>
</head>
<body>

<div id="canvas">
  <div id="stage">

  <section class="page active" id="loading">
    <img src="assets/now-loading.png" alt="now loading">
  </section>

  <section class="page" id="welcome">
    <img class="overlay" src="assets/page-2-elements.png" alt="welcome to tala's world">
    <div id="earth-wrap">
      <img id="earth-img" src="assets/earth.png" alt="click to enter">
    </div>
  </section>

  <section class="page" id="poster">
    <button class="back-btn" data-go="profile">← back</button>
    <div class="sub-page-content">
      <h1 class="title-font">A poster for you</h1>
      <div class="placeholder-box">drop Sarim's poster image here</div>
    </div>
  </section>

  <section class="page" id="video">
    <button class="back-btn" data-go="profile">← back</button>
    <div class="sub-page-content">
      <h1 class="title-font">A video for you</h1>
      <div class="placeholder-box">embed Sarim's video here</div>
    </div>
  </section>

  <section class="page" id="timeline">
    <button class="back-btn" data-go="profile">← back</button>
    <h1 class="timeline-title title-font" style="text-align:center;">Our Timeline</h1>
    <div class="timeline-track">
      <div class="timeline-line" id="timeline-line"></div>
    </div>
    <div id="scroll-hint">scroll for more →</div>
  </section>

  </div>

  <!-- these two fill the FULL canvas width (not just the letterboxed stage) -->
  <section class="page" id="family">
    <img class="bleed" id="family-img" src="assets/page-3-elements.png" alt="family on the earth">
    <img id="heart-img" src="assets/page-3-heart.png" alt="click the heart" title="click me">
  </section>

  <section class="page" id="profile">
    <button class="back-btn" data-go="family">← back</button>
    <img class="bleed" src="assets/page-4-elements.png" alt="Sarim's profile">
    <div class="hotspot" id="hs-timeline" data-go="timeline" title="Our Timeline"></div>
    <div class="hotspot" id="hs-poster" data-go="poster" title="A poster for you"></div>
    <div class="hotspot" id="hs-video" data-go="video" title="A video for you"></div>
  </section>

</div>

<audio id="bg-music" src="assets/music.mp3" loop preload="auto"></audio>

<div id="t-modal-backdrop">
  <div id="t-modal">
    <button id="t-close">✕</button>
    <span class="t-modal-date" id="t-modal-date"></span>
    <img id="t-modal-img" style="display:none;">
    <h3 id="t-modal-title"></h3>
    <p id="t-modal-desc"></p>
    <a id="t-modal-link" href="#" target="_blank" rel="noopener" style="display:none;"></a>
  </div>
</div>

<script>
/* ---------------- EDIT THIS LIST TO ADD MILESTONES ----------------
   Each entry can have:
     date  - shown above the dot
     title - shown below the dot + as the popup heading
     desc  - popup body text
     link  - optional {label, url} shown as a clickable line in the popup
     img   - optional image path (e.g. "assets/timeline/2026-03-08.jpg")
             leave as null until you send over the photos — the popup
             will just skip the image until then.
----------------------------------------------------------------------- */
const milestones = [
  { date: "Mar 8, 2026",  title: "First messages",   desc: "First messages exchanged on Instagram.", img: null },
  { date: "Mar 9, 2026",  title: "First images",      desc: "First images shared.", img: null },
  { date: "Mar 11, 2026", title: "First Letterboxd review", desc: "Tala's first Letterboxd review.", link: { label: "View the review", url: "https://boxd.it/duhBLV" }, img: null },
  { date: "Mar 13, 2026", title: "The 7-page essay",  desc: "Tala's 7 page essay.", link: { label: "Read the essay", url: "https://docs.google.com/document/d/10MA9vYKaEgec1ObPrGlD65_ijWtYA7VPu0XGh-rkunM/edit?usp=sharing" }, img: null },
  { date: "Mar 16, 2026", title: "First activity",    desc: "We watched Train Dreams together via Teleparty.", img: null },
  { date: "Mar 17, 2026", title: "Discord & our first show", desc: "Added each other on Discord, had our first Discord call, and watched our first show together — When Life Gives You Tangerines.", img: null },
  { date: "Mar 23, 2026", title: "Exchanged numbers", desc: "We exchanged phone numbers and had our first call, while you were getting melatonin from the pharmacy.", img: null },
  { date: "Apr 4, 2026",  title: "First FaceTime",    desc: "We FaceTimed for the first time — you were in your car showing me your MMA bag and gloves.", img: null },
  { date: "Date TBD",     title: "First reel",        desc: "The first reel.", img: null },
  { date: "Date TBD",     title: "First voice note",  desc: "The first voice note.", img: null },
  { date: "Jul 19, 2026", title: "Meeting in person!", desc: "We meet each other in person for the first time, inshallah!! I can't wait.", img: null },
  { date: "Future",       title: "To be determined",  desc: "Inshallah, to many more firsts :)", img: null }
];
/* -------------------------------------------------------------------- */

function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if(id === "timeline") buildTimeline();
}

function buildTimeline(){
  const line = document.getElementById("timeline-line");
  line.innerHTML = "";
  const n = milestones.length;
  line.style.minWidth = Math.max(700, n * 190) + "px";
  milestones.forEach((m,i)=>{
    const pct = n === 1 ? 50 : 8 + (i/(n-1))*84;
    const dot = document.createElement("div");
    dot.className = "t-item";
    dot.style.left = pct + "%";
    dot.innerHTML = `<span class="t-date">${m.date}</span><span class="t-label">${m.title}</span>`;
    dot.addEventListener("click", ()=>openModal(m));
    line.appendChild(dot);
  });
}

function openModal(m){
  document.getElementById("t-modal-date").textContent = m.date;
  document.getElementById("t-modal-title").textContent = m.title;
  document.getElementById("t-modal-desc").textContent = m.desc;

  const imgEl = document.getElementById("t-modal-img");
  if (m.img){
    imgEl.src = m.img;
    imgEl.style.display = "block";
  } else {
    imgEl.style.display = "none";
  }

  const linkEl = document.getElementById("t-modal-link");
  if (m.link){
    linkEl.href = m.link.url;
    linkEl.textContent = m.link.label + " ↗";
    linkEl.style.display = "inline-block";
  } else {
    linkEl.style.display = "none";
  }

  document.getElementById("t-modal-backdrop").classList.add("show");
}
document.getElementById("t-close").addEventListener("click", ()=>{
  document.getElementById("t-modal-backdrop").classList.remove("show");
});
document.getElementById("t-modal-backdrop").addEventListener("click", (e)=>{
  if(e.target.id === "t-modal-backdrop") e.target.classList.remove("show");
});

document.querySelectorAll("[data-go]").forEach(el=>{
  el.addEventListener("click", ()=> showPage(el.getAttribute("data-go")));
});
document.getElementById("earth-wrap").addEventListener("click", ()=>{
  showPage("family");
  playMusic();
});

const bgMusic = document.getElementById("bg-music");
function playMusic(){
  bgMusic.play().catch(()=>{ /* autoplay blocked until a real user gesture happens */ });
}
// try right away (works if the browser allows it / a gesture already happened)
playMusic();
// also catch the very first click/tap anywhere on the page as a fallback trigger
document.body.addEventListener("click", playMusic, { once: true });
document.getElementById("heart-img").addEventListener("click", ()=> showPage("profile"));

setTimeout(()=> showPage("welcome"), 1800);

</script>
</body>
</html>
