<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tala's World — Sarim</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#4a4a45;
    --green:#9cc9a8;
    --pink:#e6b8c2;
    --pink-soft:#f3d6dd;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Patrick Hand', sans-serif;
    background:#000;
    color:var(--ink);
    overflow:hidden;
    height:100vh;
    width:100vw;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .title-font{font-family:'Caveat', cursive;}

  #canvas{
    position:relative;
    background:url(assets/background.jpg) center/cover;
    overflow:hidden;
    flex-shrink:0;
    flex-grow:0;
  }
  .page{
    position:absolute;
    inset:0;
    opacity:0;
    pointer-events:none;
    transition:opacity .5s ease;
  }
  .page.active{
    opacity:1;
    pointer-events:auto;
  }
  .page img.bleed{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events:none;
  }

  #loading img{
    position:absolute;
    left:16.17%;
    top:36.25%;
    width:68.26%;
  }

  #welcome img.overlay{
    position:absolute;
    left:5.27%;
    top:8.34%;
    width:89.1%;
  }
  #earth-wrap{
    position:absolute;
    left:35.99%;
    top:44.26%;
    width:28.46%;
    height:51.16%;
    cursor:url(assets/cursor.png) 25 25, pointer;
    transition:transform .25s ease;
  }
  #earth-wrap:hover{transform:scale(1.04);}
  #earth-img{
    width:100%;
    height:100%;
    object-fit:contain;
    animation:earth-spin 18s linear infinite;
  }
  @keyframes earth-spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
  }
  #family-img{opacity:0; transform:scale(.96); transition:opacity .8s ease, transform .8s ease;}
  #family.active #family-img{opacity:1; transform:scale(1);}
  #heart-img{
    position:absolute;
    left:50%;
    top:36.72%;
    width:4.2%;
    transform:translate(-50%,-50%);
    cursor:url(assets/cursor.png) 25 25, pointer;
    animation:beat 1.1s ease-in-out infinite;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.15));
  }
  @keyframes beat{
    0%,100%{transform:translate(-50%,-50%) scale(1);}
    25%{transform:translate(-50%,-50%) scale(1.3);}
    40%{transform:translate(-50%,-50%) scale(1);}
  }

  .hotspot{
    position:absolute;
    cursor:url(assets/cursor.png) 25 25, pointer;
  }
  #hs-timeline{ left:66.48%; top:18.75%; width:28.54%; height:26.53%; }
  #hs-poster  { left:5.89%;  top:54.58%; width:28.56%; height:26.53%; }
  #hs-video   { left:66.48%; top:54.58%; width:28.54%; height:26.53%; }

  .sub-page-content{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px;
  }
  .sub-page-content h1{font-size:2.6rem; margin-bottom:10px;}
  .placeholder-box{
    width:min(60vw,460px);
    height:min(38vh,280px);
    border:2px dashed #c8c2b8;
    border-radius:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.1rem;
    opacity:.65;
    background:rgba(255,255,255,.35);
  }

  .timeline-title{font-size:2.4rem; margin-top:14%; margin-bottom:0;}
  .timeline-track{
    position:absolute;
    left:6%;
    right:6%;
    top:48%;
    overflow-x:auto;
    padding:60px 10px 30px;
  }
  .timeline-line{
    position:relative;
    height:3px;
    background:var(--ink);
    border-radius:2px;
    min-width:600px;
  }
  .timeline-line::before, .timeline-line::after{
    content:"";
    position:absolute;
    top:50%;
    width:0;height:0;
    border-style:solid;
    transform:translateY(-50%);
  }
  .timeline-line::before{
    left:-10px;
    border-width:6px 10px 6px 0;
    border-color:transparent var(--ink) transparent transparent;
  }
  .timeline-line::after{
    right:-10px;
    border-width:6px 0 6px 10px;
    border-color:transparent transparent transparent var(--ink);
  }
  .t-item{
    position:absolute;
    top:50%;
    transform:translate(-50%,-50%);
    width:18px;height:18px;
    border-radius:50%;
    background:var(--pink);
    border:2px solid var(--ink);
    cursor:url(assets/cursor.png) 25 25, pointer;
    transition:transform .15s ease;
  }
  .t-item:hover{transform:translate(-50%,-50%) scale(1.3);}
  .t-item .t-date{
    position:absolute;
    top:-30px;
    left:50%;
    transform:translateX(-50%);
    font-size:.8rem;
    white-space:nowrap;
    color:var(--ink);
    font-family:'Caveat',cursive;
  }
  .t-item .t-label{
    position:absolute;
    top:24px;
    left:50%;
    transform:translateX(-50%);
    font-size:.8rem;
    white-space:nowrap;
    max-width:120px;
  }

  #t-modal-backdrop{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.25);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
  }
  #t-modal-backdrop.show{display:flex;}
  #t-modal{
    background:#f1f0ec;
    border:2px solid var(--ink);
    border-radius:18px;
    padding:30px 34px;
    max-width:380px;
    text-align:center;
    position:relative;
  }
  #t-modal h3{margin:0 0 6px; font-family:'Caveat',cursive; font-size:1.8rem;}
  #t-modal .t-modal-date{color:#8a6fc2; margin-bottom:10px; display:block;}
  #t-close{
    position:absolute; top:8px; right:12px;
    cursor:pointer; font-size:1.2rem; background:none; border:none; color:var(--ink);
  }

  .back-btn{
    position:absolute;
    top:4%;
    left:3%;
    background:rgba(255,255,255,.55);
    border:1px solid var(--ink);
    border-radius:20px;
    padding:6px 16px;
    font-family:'Patrick Hand',sans-serif;
    cursor:url(assets/cursor.png) 25 25, pointer;
    z-index:10;
  }
</style>
</head>
<body>

<div id="canvas">

  <section class="page active" id="loading">
    <img src="assets/now-loading.png" alt="now loading">
  </section>

  <section class="page" id="welcome">
    <img class="overlay" src="assets/page-2-elements.png" alt="welcome to tala's world">
    <div id="earth-wrap">
      <img id="earth-img" src="assets/earth.png" alt="click to enter">
    </div>
  </section>

  <section class="page" id="family">
    <img class="bleed" id="family-img" src="assets/page-3-elements.png" alt="family on the earth">
    <img id="heart-img" src="assets/page-3-heart.png" alt="click the heart" title="click me">
  </section>

  <section class="page" id="profile">
    <button class="back-btn" data-go="family">← back</button>
    <img class="bleed" src="assets/page-4-elements.png" alt="Sarim's profile">
    <div class="hotspot" id="hs-timeline" data-go="timeline" title="Our Timeline"></div>
    <div class="hotspot" id="hs-poster" data-go="poster" title="A poster for you"></div>
    <div class="hotspot" id="hs-video" data-go="video" title="A video for you"></div>
  </section>

  <section class="page" id="poster">
    <button class="back-btn" data-go="profile">← back</button>
    <div class="sub-page-content">
      <h1 class="title-font">A poster for you</h1>
      <div class="placeholder-box">drop Sarim's poster image here</div>
    </div>
  </section>

  <section class="page" id="video">
    <button class="back-btn" data-go="profile">← back</button>
    <div class="sub-page-content">
      <h1 class="title-font">A video for you</h1>
      <div class="placeholder-box">embed Sarim's video here</div>
    </div>
  </section>

  <section class="page" id="timeline">
    <button class="back-btn" data-go="profile">← back</button>
    <h1 class="timeline-title title-font" style="text-align:center;">Our Timeline</h1>
    <div class="timeline-track">
      <div class="timeline-line" id="timeline-line"></div>
    </div>
  </section>

</div>

<div id="t-modal-backdrop">
  <div id="t-modal">
    <button id="t-close">✕</button>
    <span class="t-modal-date" id="t-modal-date"></span>
    <h3 id="t-modal-title"></h3>
    <p id="t-modal-desc"></p>
  </div>
</div>

<script>
/* ---------------- EDIT THIS LIST TO ADD MILESTONES ---------------- */
const milestones = [
  { date: "Apr 2026", title: "Found out!",      desc: "The day Tala found out Sarim was on the way." },
  { date: "Jun 2026", title: "First scan",      desc: "Saw his little heartbeat for the first time." },
  { date: "Aug 2026", title: "Nursery ready",   desc: "Painted the room and put together the crib." },
  { date: "Due date", title: "Welcome, Sarim!", desc: "The day we finally meet you." }
];
/* -------------------------------------------------------------------- */

function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if(id === "timeline") buildTimeline();
}

function buildTimeline(){
  const line = document.getElementById("timeline-line");
  line.innerHTML = "";
  const n = milestones.length;
  milestones.forEach((m,i)=>{
    const pct = n === 1 ? 50 : 8 + (i/(n-1))*84;
    const dot = document.createElement("div");
    dot.className = "t-item";
    dot.style.left = pct + "%";
    dot.innerHTML = `<span class="t-date">${m.date}</span><span class="t-label">${m.title}</span>`;
    dot.addEventListener("click", ()=>openModal(m));
    line.appendChild(dot);
  });
}

function openModal(m){
  document.getElementById("t-modal-date").textContent = m.date;
  document.getElementById("t-modal-title").textContent = m.title;
  document.getElementById("t-modal-desc").textContent = m.desc;
  document.getElementById("t-modal-backdrop").classList.add("show");
}
document.getElementById("t-close").addEventListener("click", ()=>{
  document.getElementById("t-modal-backdrop").classList.remove("show");
});
document.getElementById("t-modal-backdrop").addEventListener("click", (e)=>{
  if(e.target.id === "t-modal-backdrop") e.target.classList.remove("show");
});

document.querySelectorAll("[data-go]").forEach(el=>{
  el.addEventListener("click", ()=> showPage(el.getAttribute("data-go")));
});
document.getElementById("earth-wrap").addEventListener("click", ()=> showPage("family"));
document.getElementById("heart-img").addEventListener("click", ()=> showPage("profile"));

setTimeout(()=> showPage("welcome"), 1800);

function fitCanvas(){
  const el = document.getElementById("canvas");
  const targetRatio = 16/9;
  const vw = window.innerWidth, vh = window.innerHeight;
  let w, h;
  // "cover" sizing: scale up so the 16:9 canvas always fully fills the
  // screen, cropping any overflow (instead of leaving letterbox bars)
  if (vw / vh > targetRatio){ w = vw; h = w / targetRatio; }
  else { h = vh; w = h * targetRatio; }
  el.style.width = w + "px";
  el.style.height = h + "px";
}
window.addEventListener("resize", fitCanvas);
fitCanvas();
</script>
</body>
</html>
