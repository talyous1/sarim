<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tala's World — Sarim</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#4a4a45;
    --green:#9cc9a8;
    --pink:#e6b8c2;
    --pink-soft:#f3d6dd;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Patrick Hand', sans-serif;
    background:url(assets/background.jpg) center/cover;
    color:var(--ink);
    overflow:hidden;
    height:100vh;
    width:100vw;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:url(assets/cursor.png) 25 25, auto;
  }
  .title-font{font-family:'Caveat', cursive;}

  #mute-btn{
    position:absolute;
    top:14px;
    right:14px;
    z-index:40;
    width:42px;
    height:42px;
    border-radius:50%;
    border:1px solid var(--ink);
    background:rgba(255,255,255,.6);
    font-size:1.2rem;
    line-height:1;
    display:none;
    align-items:center;
    justify-content:center;
    cursor:url(assets/cursor-click.png) 25 25, pointer;
    transition:transform .15s ease, background .15s ease;
  }
  #mute-btn:hover{ transform:scale(1.08); background:rgba(255,255,255,.85); }
  #mute-btn.visible{ display:flex; }

  /* click cursor shows on hover over anything clickable, as an affordance */
  #earth-wrap:hover,
  #heart-img:hover,
  .hotspot:hover,
  .t-item:hover,
  .back-btn:hover,
  #t-close:hover,
  #t-modal-link:hover{
    cursor:url(assets/cursor-click.png) 25 25, pointer !important;
  }

  #canvas{
    position:relative;
    width:1280px;
    height:631px;
    background:url(assets/background.jpg) center/cover;
    overflow:hidden;
    flex-shrink:0;
    flex-grow:0;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #stage{
    position:relative;
    height:100%;
    max-width:100%;
    aspect-ratio:16/9;
    overflow:hidden;
  }
  .page{
    position:absolute;
    inset:0;
    opacity:0;
    pointer-events:none;
    transition:opacity .5s ease;
  }
  .page.active{
    opacity:1;
    pointer-events:auto;
  }
  .page img.bleed{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center top;
    pointer-events:none;
  }

  #loading img{
    position:absolute;
    left:16.17%;
    top:36.25%;
    width:68.26%;
    animation:loading-pulse 1.1s ease-in-out infinite;
    transform-origin:center;
  }
  @keyframes loading-pulse{
    0%,100%{ opacity:.55; transform:scale(.97); }
    50%{ opacity:1; transform:scale(1.02); }
  }

  #welcome img.overlay{
    position:absolute;
    left:5.27%;
    top:8.34%;
    width:89.1%;
  }
  #earth-wrap{
    position:absolute;
    left:35.99%;
    top:44.26%;
    width:28.46%;
    height:51.16%;
    cursor:url(assets/cursor.png) 25 25, pointer;
    transition:transform .25s ease;
  }
  #earth-wrap:hover{transform:scale(1.04);}
  #earth-img{
    width:100%;
    height:100%;
    object-fit:contain;
    animation:earth-spin 18s linear infinite;
  }
  @keyframes earth-spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
  }
  #family-img{opacity:0; transform:scale(.96); transition:opacity .8s ease, transform .8s ease;}
  #family.active #family-img{opacity:1; transform:scale(1);}
  #heart-img{
    position:absolute;
    left:50%;
    top:41.89%;
    width:4.2%;
    transform:translate(-50%,-50%);
    cursor:url(assets/cursor.png) 25 25, pointer;
    animation:beat 1.1s ease-in-out infinite;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.15));
  }
  @keyframes beat{
    0%,100%{transform:translate(-50%,-50%) scale(1);}
    25%{transform:translate(-50%,-50%) scale(1.3);}
    40%{transform:translate(-50%,-50%) scale(1);}
  }

  .hotspot{
    position:absolute;
    cursor:url(assets/cursor.png) 25 25, pointer;
  }
  #hs-timeline{ left:67.6%;  top:28.93%; width:18.82%; height:19.97%; }
  #hs-poster  { left:13.34%; top:64.17%; width:18.83%; height:19.93%; }
  #hs-video   { left:67.81%; top:64.17%; width:18.82%; height:19.93%; }

  .sub-page-content{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px;
  }
  .sub-page-content h1{font-size:2.6rem; margin-bottom:10px;}
  .placeholder-box{
    width:min(60vw,460px);
    height:min(38vh,280px);
    border:2px dashed #c8c2b8;
    border-radius:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.1rem;
    opacity:.65;
    background:rgba(255,255,255,.35);
  }

  #timeline{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:26%;
  }
  .timeline-rows{
    width:78%;
    display:flex;
    flex-direction:column;
    gap:100px;
  }
  .timeline-footer{
    margin-top:60px;
    font-family:'Caveat',cursive;
    font-size:1.6rem;
    color:var(--ink);
    text-align:center;
  }
  .timeline-row{
    position:relative;
    height:3px;
    background:var(--ink);
    border-radius:2px;
  }
  .timeline-row::before, .timeline-row::after{
    content:"";
    position:absolute;
    top:50%;
    width:0;height:0;
    border-style:solid;
    transform:translateY(-50%);
  }
  .timeline-row::before{
    left:-10px;
    border-width:6px 10px 6px 0;
    border-color:transparent var(--ink) transparent transparent;
  }
  .timeline-row::after{
    right:-10px;
    border-width:6px 0 6px 10px;
    border-color:transparent transparent transparent var(--ink);
  }
  .t-item{
    position:absolute;
    top:50%;
    transform:translate(-50%,-50%);
    width:18px;height:18px;
    border-radius:50%;
    background:var(--pink);
    border:2px solid var(--ink);
    cursor:url(assets/cursor.png) 25 25, pointer;
    transition:transform .15s ease;
  }
  .t-item:hover{transform:translate(-50%,-50%) scale(1.3);}
  .t-item .t-date{
    position:absolute;
    top:-34px;
    left:50%;
    transform:translateX(-50%);
    font-size:1.05rem;
    font-weight:600;
    white-space:nowrap;
    color:var(--ink);
    font-family:'Caveat',cursive;
  }
  .t-item .t-label{
    position:absolute;
    top:26px;
    left:50%;
    transform:translateX(-50%);
    font-size:.95rem;
    line-height:1.15;
    width:130px;
    text-align:center;
  }

  #t-modal-backdrop{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.25);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
  }
  #t-modal-backdrop.show{display:flex;}
  #t-modal{
    background:#f1f0ec;
    border:2px solid var(--ink);
    border-radius:18px;
    padding:24px 28px;
    width:94vw;
    max-width:1150px;
    max-height:92vh;
    overflow-y:auto;
    text-align:center;
    position:relative;
  }
  #t-modal h3{margin:0 0 4px; font-family:'Caveat',cursive; font-size:1.9rem;}
  #t-modal .t-modal-date{color:#8a6fc2; margin-bottom:10px; display:block; font-size:1.1rem;}
  #t-modal-gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    align-items:center;
    gap:14px;
    margin-bottom:14px;
  }
  #t-modal-gallery:empty{display:none; margin-bottom:0;}
  /* default (1-2 images): big, up to half width each, tall allowed */
  #t-modal-gallery img{
    max-width:calc(50% - 8px);
    max-height:74vh;
    width:auto;
    height:auto;
    border-radius:10px;
    border:1px solid #d8d4cb;
    background:#fff;
  }
  /* a single image gets the full width of the modal */
  #t-modal-gallery img:only-child{
    max-width:100%;
    max-height:76vh;
  }
  /* 3+ images: 2 per row, capped height so two rows fit */
  #t-modal-gallery.many img{
    max-height:46vh;
  }
  #t-modal-audio{
    width:100%;
    margin-bottom:14px;
    display:flex;
    flex-direction:column;
    gap:10px;
    align-items:center;
  }
  #t-modal-audio:empty{display:none;}
  #t-modal-audio audio{ width:min(90%, 520px); }
  #t-modal-video{ margin-bottom:14px; }
  #t-modal-video:empty{display:none;}
  #t-modal-video video{ width:100%; max-height:60vh; border-radius:14px; display:block; }
  #t-modal-link{
    margin-top:6px;
    color:#8a6fc2;
    text-decoration:underline;
    font-family:'Patrick Hand',sans-serif;
    cursor:url(assets/cursor.png) 25 25, pointer;
  }
  #t-close{
    position:absolute; top:8px; right:12px;
    cursor:pointer; font-size:1.2rem; background:none; border:none; color:var(--ink);
  }

  .back-btn{
    position:absolute;
    top:4%;
    left:3%;
    background:rgba(255,255,255,.55);
    border:1px solid var(--ink);
    border-radius:20px;
    padding:6px 16px;
    font-family:'Patrick Hand',sans-serif;
    cursor:url(assets/cursor.png) 25 25, pointer;
    z-index:10;
  }
</style>
</head>
<body>

<div id="canvas">
  <button id="mute-btn" title="Mute / unmute music" aria-label="Mute music">🔊</button>
  <div id="stage">

  <section class="page active" id="loading">
    <img src="assets/now-loading.png" alt="now loading">
  </section>

  <section class="page" id="welcome">
    <img class="overlay" src="assets/page-2-elements.png" alt="welcome to tala's world">
    <div id="earth-wrap">
      <img id="earth-img" src="assets/earth.png" alt="click to enter">
    </div>
  </section>

  <section class="page" id="poster">
    <button class="back-btn" data-go="profile">← back</button>
    <div class="sub-page-content">
      <h1 class="title-font">A poster for you</h1>
      <div class="placeholder-box">drop Sarim's poster image here</div>
    </div>
  </section>

  <section class="page" id="video">
    <button class="back-btn" data-go="profile">← back</button>
    <div class="sub-page-content">
      <h1 class="title-font">A video for you</h1>
      <div class="placeholder-box">embed Sarim's video here</div>
    </div>
  </section>

  </div>

  <!-- these two fill the FULL canvas width (not just the letterboxed stage) -->
  <section class="page" id="family">
    <img class="bleed" id="family-img" src="assets/page-3-elements.png" alt="family on the earth">
    <img id="heart-img" src="assets/page-3-heart.png" alt="click the heart" title="click me">
  </section>

  <section class="page" id="profile">
    <button class="back-btn" data-go="family">← back</button>
    <img class="bleed" src="assets/page-4-elements.png" alt="Sarim's profile">
    <div class="hotspot" id="hs-timeline" data-go="timeline" title="Our Timeline"></div>
    <div class="hotspot" id="hs-poster" data-go="poster" title="A poster for you"></div>
    <div class="hotspot" id="hs-video" data-go="video" title="A video for you"></div>
  </section>

  <section class="page" id="timeline">
    <button class="back-btn" data-go="profile">← back</button>
    <img class="bleed" src="assets/page-5-elements.png" alt="Our Timeline">
    <div class="timeline-rows" id="timeline-rows"></div>
    <p class="timeline-footer">and inshallah, to many more!</p>
  </section>

</div>

<audio id="bg-music" src="assets/music.mp3" loop preload="auto"></audio>

<div id="t-modal-backdrop">
  <div id="t-modal">
    <button id="t-close">✕</button>
    <span class="t-modal-date" id="t-modal-date"></span>
    <div id="t-modal-gallery"></div>
    <div id="t-modal-video"></div>
    <div id="t-modal-audio"></div>
    <h3 id="t-modal-title"></h3>
    <p id="t-modal-desc"></p>
    <a id="t-modal-link" href="#" target="_blank" rel="noopener" style="display:none;"></a>
  </div>
</div>

<script>
/* ---------------- EDIT THIS LIST TO ADD MILESTONES ----------------
   Each entry can have:
     date   - shown above the dot
     title  - shown below the dot + as the popup heading
     desc   - popup body text
     link   - optional {label, url} shown as a clickable line in the popup
     images - optional array of image paths shown in the popup, in order
----------------------------------------------------------------------- */
const milestones = [
  { date: "Mar 8, 2026",  title: "First messages",   desc: "First messages exchanged on Instagram.",
    images: ["assets/timeline/first-messages-1.jpg","assets/timeline/first-messages-2.jpg","assets/timeline/first-messages-3.jpg","assets/timeline/first-messages-4.jpg"] },
  { date: "Mar 9, 2026",  title: "First images",      desc: "First images shared.", images: ["assets/timeline/first-image-1.jpg","assets/timeline/first-image-2.jpg"] },
  { date: "Mar 11, 2026", title: "First Letterboxd review", desc: "Tala's first Letterboxd review.", link: { label: "View the review", url: "https://boxd.it/duhBLV" }, images: ["assets/timeline/letterboxd-review.jpg"] },
  { date: "Mar 11, 2026", title: "Sarim's first reel", desc: "The first reel Sarim shared.", link: { label: "Watch the reel", url: "https://www.instagram.com/reel/DUlLBvAChKW/" } },
  { date: "Mar 13, 2026", title: "The 7-page essay",  desc: "Tala's 7 page essay.", link: { label: "Read the essay", url: "https://docs.google.com/document/d/10MA9vYKaEgec1ObPrGlD65_ijWtYA7VPu0XGh-rkunM/edit?usp=sharing" }, images: ["assets/timeline/essay.jpg"] },
  { date: "Mar 13, 2026", title: "Sarim's first voice note", desc: "The first voice note Sarim sent.", audio: ["assets/timeline/sarim-first-vn.mp3"] },
  { date: "Mar 14, 2026", title: "Tala's first voice note", desc: "The first voice note Tala sent.", audio: ["assets/timeline/tala-first-vn.mp3"] },
  { date: "Mar 16, 2026", title: "First activity",    desc: "We watched Train Dreams together via Teleparty.", images: ["assets/timeline/first-activity.jpg"] },
  { date: "Mar 17, 2026", title: "Discord & our first show", desc: "Added each other on Discord, had our first Discord call, and watched our first show together — When Life Gives You Tangerines.", images: ["assets/timeline/discord-1.jpg","assets/timeline/discord-2.jpg","assets/timeline/first-show.jpg"] },
  { date: "Mar 17, 2026", title: "Tala's first reel", desc: "The first reel Tala shared.", link: { label: "Watch the reel", url: "https://www.instagram.com/reel/DSh52xPCPcy/" } },
  { date: "Mar 23, 2026", title: "Exchanged numbers", desc: "We exchanged phone numbers and had our first call, while you were getting melatonin from the pharmacy.", images: ["assets/timeline/exchanged-numbers-1.jpg","assets/timeline/exchanged-numbers-2.jpg","assets/timeline/exchanged-numbers-3.jpg"] },
  { date: "Mar 26, 2026", title: "First videos", desc: "We sent each other our first videos of us.", video: ["assets/timeline/first-video.mov"] },
  { date: "Apr 4, 2026",  title: "First FaceTime",    desc: "We FaceTimed for the first time — you were in your car showing me your MMA bag and gloves.", images: ["assets/timeline/facetime.jpg"] },
  { date: "Jul 19, 2026", title: "Meeting in person!", desc: "We meet each other in person for the first time, inshallah!! I can't wait.", images: [] }
];
/* -------------------------------------------------------------------- */

function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if(id === "timeline") buildTimeline();
}

function buildTimeline(){
  const rowsContainer = document.getElementById("timeline-rows");
  rowsContainer.innerHTML = "";

  const n = milestones.length;
  const half = Math.ceil(n / 2);
  const rows = [milestones.slice(0, half), milestones.slice(half)];

  rows.forEach(rowMilestones => {
    if (rowMilestones.length === 0) return;
    const row = document.createElement("div");
    row.className = "timeline-row";
    const len = rowMilestones.length;
    rowMilestones.forEach((m,i)=>{
      const pct = len === 1 ? 50 : 6 + (i/(len-1))*88;
      const dot = document.createElement("div");
      dot.className = "t-item";
      dot.style.left = pct + "%";
      dot.innerHTML = `<span class="t-date">${m.date}</span><span class="t-label">${m.title}</span>`;
      dot.addEventListener("click", ()=>openModal(m));
      row.appendChild(dot);
    });
    rowsContainer.appendChild(row);
  });
}

function openModal(m){
  document.getElementById("t-modal-date").textContent = m.date;
  document.getElementById("t-modal-title").textContent = m.title;
  document.getElementById("t-modal-desc").textContent = m.desc;

  const gallery = document.getElementById("t-modal-gallery");
  gallery.innerHTML = "";
  const imgs = m.images || [];
  gallery.classList.toggle("many", imgs.length >= 3);
  imgs.forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    gallery.appendChild(img);
  });

  const videoWrap = document.getElementById("t-modal-video");
  videoWrap.innerHTML = "";
  (m.video || []).forEach(src => {
    const video = document.createElement("video");
    video.controls = true;
    video.src = src;
    videoWrap.appendChild(video);
  });

  const audioWrap = document.getElementById("t-modal-audio");
  audioWrap.innerHTML = "";
  (m.audio || []).forEach(src => {
    const audio = document.createElement("audio");
    audio.controls = true;
    audio.src = src;
    audioWrap.appendChild(audio);
  });

  const linkEl = document.getElementById("t-modal-link");
  if (m.link){
    linkEl.href = m.link.url;
    linkEl.textContent = m.link.label + " ↗";
    linkEl.style.display = "inline-block";
  } else {
    linkEl.style.display = "none";
  }

  // scroll modal back to top whenever it opens
  document.getElementById("t-modal").scrollTop = 0;
  document.getElementById("t-modal-backdrop").classList.add("show");
}
document.getElementById("t-close").addEventListener("click", ()=>{
  document.getElementById("t-modal-backdrop").classList.remove("show");
});
document.getElementById("t-modal-backdrop").addEventListener("click", (e)=>{
  if(e.target.id === "t-modal-backdrop") e.target.classList.remove("show");
});

document.querySelectorAll("[data-go]").forEach(el=>{
  el.addEventListener("click", ()=> showPage(el.getAttribute("data-go")));
});
document.getElementById("earth-wrap").addEventListener("click", ()=>{
  showPage("family");
  playMusic();
});

const bgMusic = document.getElementById("bg-music");
function playMusic(){
  if (bgMusic.muted) return; // don't fight the user's mute choice
  bgMusic.play().catch(()=>{ /* autoplay blocked until a real user gesture happens */ });
}
// also catch the very first click/tap anywhere on the page as a fallback trigger,
// in case the browser blocked the automatic attempt below
document.body.addEventListener("click", playMusic, { once: true });
document.getElementById("heart-img").addEventListener("click", ()=> showPage("profile"));

// mute / unmute toggle (appears after the loading screen)
const muteBtn = document.getElementById("mute-btn");
muteBtn.addEventListener("click", (e)=>{
  e.stopPropagation();
  bgMusic.muted = !bgMusic.muted;
  muteBtn.textContent = bgMusic.muted ? "🔇" : "🔊";
  if (!bgMusic.muted) bgMusic.play().catch(()=>{});
});

setTimeout(()=>{
  showPage("welcome");
  muteBtn.classList.add("visible"); // reveal the control once loading is done
  playMusic(); // start music right as the loading screen finishes
}, 1800);

</script>
</body>
</html>
